# release-announce.yml — instant "release is live" announcement on merge.
#
# WHAT IT DOES
#   When a base->prod release PR that the agent opened (title `Release v<X.Y.Z>
#   [agent]`) is MERGED, this workflow fires immediately: it sends the team a
#   `🎉 <repo> v<X.Y.Z> live` Telegram message and posts a `📣 announced` marker
#   comment back on the PR. The ticket-loop's own babysit does the same thing on
#   its next pass, but poll-based — a merge between passes waits. This makes the
#   announcement instant, and because it drops the SAME `📣 announced` marker, the
#   loop sees the marker and stays quiet (no double announce). The loop remains the
#   fallback for repos without this hook, or when the Action fails.
#
# INSTALL (a human does this — the agent NEVER installs it itself; the framework
# baseline forbids the agent editing .github/workflows/**)
#   1. Copy this file to `.github/workflows/release-announce.yml` in your repo.
#   2. Replace [PROD_BRANCH] below with your repo's prod branch (e.g. `main`).
#   3. Add two repository secrets (Settings -> Secrets and variables -> Actions):
#        TELEGRAM_BOT_TOKEN  — the same bot token the loop uses
#        TELEGRAM_CHAT_ID    — the dedicated group's chat id
#   That's it — no other wiring. The default GITHUB_TOKEN posts the PR comment.

name: release-announce

on:
  pull_request:
    types: [closed]

jobs:
  announce:
    # Gate: the PR merged (not just closed), targeted the prod branch, and carries
    # the stable agent release marker in its title. Hotfix or human-made prod PRs
    # never match all three.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == '[PROD_BRANCH]' &&
      startsWith(github.event.pull_request.title, 'Release v') &&
      endsWith(github.event.pull_request.title, '[agent]')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # to post the `📣 announced` marker comment
    steps:
      - name: Parse version from the PR title
        id: ver
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Title is `Release v<X.Y.Z> [agent]` — pull the v<...> token out.
          VERSION="$(printf '%s' "$TITLE" | sed -E 's/^Release (v[^ ]+).*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Announce to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.event.repository.name }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🎉 ${REPO} ${VERSION} live"

      - name: Mark the PR announced (so the loop's babysit stays quiet)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "📣 announced"
